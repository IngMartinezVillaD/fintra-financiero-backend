# ================================================================
# docker-compose.prod.yml — Stack productivo completo
# Uso: docker compose -f infra/docker/docker-compose.prod.yml up -d
# Requiere: .env.prod con las variables de producción
# ================================================================
name: fintra-financiero-prod

services:

  postgres:
    image: postgres:18-alpine
    container_name: fintra-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [fintra-net]

  backend:
    image: fintra/fintra-financiero-backend:${APP_VERSION:-latest}
    container_name: fintra-backend-prod
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SPRING_PROFILES_ACTIVE: prod
      TS_BASE_URL: ${TS_BASE_URL}
      TS_API_KEY: ${TS_API_KEY}
      TS_WEBHOOK_SECRET: ${TS_WEBHOOK_SECRET}
      INTEGRACIONES_BITRIX24_ACTIVO: ${BITRIX24_ACTIVO:-false}
      INTEGRACIONES_BITRIX24_WEBHOOK_URL: ${BITRIX24_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks: [fintra-net]

  frontend:
    image: fintra/fintra-financiero-frontend:${APP_VERSION:-latest}
    container_name: fintra-frontend-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_BASE_URL: http://backend:8080/fintra-financiero-service
    depends_on:
      backend:
        condition: service_healthy
    networks: [fintra-net]

  prometheus:
    image: prom/prometheus:latest
    container_name: fintra-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks: [fintra-net]

  grafana:
    image: grafana/grafana:latest
    container_name: fintra-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus]
    networks: [fintra-net]

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  fintra-net:
    driver: bridge
