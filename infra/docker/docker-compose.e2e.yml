# ================================================================
# docker-compose.e2e.yml — Stack para pruebas E2E en CI
# WireMock simula: Thomas Signe, Bitrix24, Apotheosys
# Uso: docker compose -f infra/docker/docker-compose.e2e.yml up -d
# ================================================================
name: fintra-financiero-e2e

services:

  postgres:
    image: postgres:18-alpine
    container_name: fintra-postgres-e2e
    environment:
      POSTGRES_DB: financiera_e2e
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: e2e_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financiera_e2e"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [e2e-net]

  wiremock:
    image: wiremock/wiremock:latest
    container_name: fintra-wiremock-e2e
    volumes:
      - ../../src/test/resources/wiremock:/home/wiremock
    command: ["--port", "8888", "--verbose"]
    networks: [e2e-net]

  backend:
    image: fintra/fintra-financiero-backend:e2e
    container_name: fintra-backend-e2e
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/financiera_e2e
      DB_USER: postgres
      DB_PASSWORD: e2e_pass
      JWT_SECRET: e2e-test-secret-64chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx!!
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      SPRING_PROFILES_ACTIVE: local,e2e
      TS_BASE_URL: http://wiremock:8888/thomas-signe
      TS_API_KEY: test-api-key
      TS_WEBHOOK_SECRET: test-webhook-secret
      INTEGRACIONES_BITRIX24_ACTIVO: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks: [e2e-net]

  frontend:
    image: fintra/fintra-financiero-frontend:e2e
    container_name: fintra-frontend-e2e
    ports:
      - "4200:80"
    environment:
      API_BASE_URL: http://backend:8080/fintra-financiero-service
    depends_on:
      backend:
        condition: service_healthy
    networks: [e2e-net]

networks:
  e2e-net:
    driver: bridge
