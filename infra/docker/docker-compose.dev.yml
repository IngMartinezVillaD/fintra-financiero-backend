# ================================================================
# docker-compose.dev.yml — Ecosistema de desarrollo BACKEND
# Levanta: PostgreSQL 18
# Uso: docker compose -f infra/docker/docker-compose.dev.yml up -d
# ================================================================
name: pluto-dev

services:

  postgres:
    image: postgres:18-alpine
    container_name: pluto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: financiera
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bdversion18
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financiera"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pluto-net

volumes:
  postgres_data:

networks:
  pluto-net:
    driver: bridge
