# ================================================================
# docker-compose.dev.yml — Ecosistema de desarrollo BACKEND
# Levanta: PostgreSQL 18 + pgAdmin + Mailhog + Redis
# Uso: docker compose -f infra/docker/docker-compose.dev.yml up -d
# ================================================================
name: fintra-financiero-dev

services:

  postgres:
    image: postgres:18-alpine
    container_name: fintra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: financiera
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bdversion18
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financiera"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - fintra-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fintra-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@fintra.co
      PGADMIN_DEFAULT_PASSWORD: fintra_dev
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fintra-net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: fintra-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI Web
    networks:
      - fintra-net

  redis:
    image: redis:7-alpine
    container_name: fintra-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - fintra-net

volumes:
  postgres_data:
  redis_data:

networks:
  fintra-net:
    driver: bridge
