spring:
  application:
    name: fintra-financiero-service
  threads:
    virtual:
      enabled: true
  mvc:
    dispatch-options-request: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/financiera}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:bdversion18}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      pool-name: FintraHikariPool
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: prestamos
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 21
    validate-on-migrate: false
    locations: classpath:db/migration
    schemas: prestamos,auditoria,integraciones,seguridad
    # db/dev-seed solo se activa en perfil local (ver application-local.yml)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
  web:
    resources:
      add-mappings: false

server:
  servlet:
    context-path: /fintra-financiero-service

management:
  server:
    port: 8080
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true

security:
  jwt:
    secret: ${JWT_SECRET:fintra-financiero-secret-key-must-be-at-least-64-characters-long-for-HS512!!}
    access-token-expiration: 900
    refresh-token-expiration: 43200
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

integraciones:
  thomas-signe:
    base-url: ${TS_BASE_URL:https://mock.thomassigne.com/api}
    api-key: ${TS_API_KEY:mock-api-key}
    webhook-secret: ${TS_WEBHOOK_SECRET:fintra-webhook-secret-2026}
    timeout-ms: 10000
    expiracion-firma-dias: 15
  documentos:
    storage-path: ${DOCS_STORAGE_PATH:/tmp/fintra-docs}

logging:
  level:
    root: INFO
    co.fintra: DEBUG
    org.hibernate.SQL: WARN
